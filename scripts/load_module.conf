# scripts/load_module.conf
#
# Redis / Memurai config snippet to load the FractalSQL module at
# server startup. Append the loadmodule line below to your server
# config file (or `include` this file from it), then restart.
#
# Linux (Redis):
#     sudo cp scripts/load_module.conf /etc/redis/modules-available/fractalsql.conf
#     # then add to /etc/redis/redis.conf:
#     #     include /etc/redis/modules-available/fractalsql.conf
#     # or append the loadmodule line directly.
#     sudo systemctl restart redis-server   # Debian / Ubuntu
#     sudo systemctl restart redis          # RHEL / Fedora
#
# Windows (Memurai):
#     # Add to C:\ProgramData\Memurai\memurai.conf (adjust path if
#     # Memurai was installed somewhere other than the default root):
#     #     loadmodule "C:\Program Files\Memurai\modules\fractalsql.dll"
#     Restart-Service Memurai
#
# Runtime alternative (does NOT persist across restarts):
#
#     redis-cli  MODULE LOAD /usr/lib/redis/modules/fractalsql.so
#     memurai-cli MODULE LOAD "C:\Program Files\Memurai\modules\fractalsql.dll"
#
# Sanity check after load:
#
#     redis-cli MODULE LIST
#     redis-cli FRACTALSQL.EDITION         # -> "Community"
#     redis-cli FRACTALSQL.VERSION         # -> "1.0.0"
#     redis-cli COMMAND INFO FRACTAL.SEARCH

loadmodule /usr/lib/redis/modules/fractalsql.so
